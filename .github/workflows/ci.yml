# =============================================================================
# Continuous Integration — runs on every push / pull request.
#
# Steps:
#   1. Install Python deps.
#   2. Lint with flake8 (basic checks).
#   3. Run pytest (API, pollution logic, PySpark transform, DB utility).
#   4. Validate the docker-compose configuration.
#
# This workflow DOES NOT deploy. Deployment is handled separately by deploy.yml.
# =============================================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # PySpark needs a JVM for the Spark transform tests.
      - name: Set up Java (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Fail on real errors; keep style warnings non-blocking for v1.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --extend-ignore=E203,W503 --exit-zero --statistics

      - name: Run tests
        env:
          # No real DB in CI → connection checks should return False, not crash.
          POSTGRES_HOST: localhost
        run: pytest -q

  compose-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env for interpolation
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config
